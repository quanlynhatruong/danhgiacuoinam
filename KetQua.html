<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://i.ibb.co/d0JNW94Z/logo-l-a-ch-n6.png">
    <title>Kết Quả Đánh Giá Xếp Loại Viên Chức - TH&THCS Hợp Thành</title>
    
    <style>
        :root { --mau-c: #0056b3; --mau-n: #f4f7f6; --mau-t: #333333; }
        body { font-family: 'Times New Roman', Times, serif; background-color: var(--mau-n); color: var(--mau-t); line-height: 1.4; margin: 0; padding: 0; }
        
        .bo-cuc-tong { display: flex; max-width: 1400px; margin: 0 auto; align-items: stretch; min-height: 100vh; }
        
        .khung-trai { width: 250px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-top: 25px; position: sticky; top: 0; height: 100vh; background-color: var(--mau-c); padding-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); box-sizing: border-box; overflow-y: auto;}
        .khung-logo { margin-bottom: 15px; display: flex; align-items: center; justify-content: center;}
        .khung-logo img { width: 85px; background: white; border-radius: 50%; padding: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}
        .ten-truong-trai { color: #ffffff; font-size: 15px; font-weight: bold; text-align: center; margin-bottom: 20px; line-height: 1.4; padding: 0 15px; text-transform: uppercase; border-bottom: 1px dashed rgba(255, 255, 255, 0.4); padding-bottom: 15px; width: 85%;}
        
        .danh-muc-trai { width: 100%; display: flex; flex-direction: column; padding: 0; box-sizing: border-box;}
        .the-chuyen { color: #ffffff; font-size: 16px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-decoration: none; cursor: pointer; transition: 0.2s; display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.15); box-sizing: border-box;}
        .the-chuyen:first-child { border-top: 1px solid rgba(255, 255, 255, 0.15); }
        .the-chuyen:hover { background-color: rgba(255, 255, 255, 0.1); font-weight: 500;}
        .b-tuong { margin-right: 12px; font-size: 18px; display: inline-block; width: 24px; text-align: center;}
        
        .k-ngoai { flex: 1; background: white; padding: 0 30px 25px 30px; border-radius: 0 5px 5px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; width: 100%; box-sizing: border-box; margin: 0;}
        
        .k-header-sticky { position: sticky; top: 0; background: #ffffff; z-index: 1000; padding-top: 15px; padding-bottom: 5px; display: flex; flex-direction: column; align-items: center;}
        .n-dx { position: absolute; top: 15px; right: 0; padding: 6px 15px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: bold;}
        .n-dx:hover { background: #5a6268; }

        .k-dau { text-align: center; margin-bottom: 8px; border-bottom: 2px solid var(--mau-c); padding-bottom: 8px; width: 100%;}
        .k-dau h2 { font-size: 16px; font-weight: bold; margin: 0; color: #555; }
        .k-dau h1 { font-size: 24px; color: var(--mau-c); text-transform: uppercase; margin: 4px 0; }
        .k-dau p { margin: 2px 0 0 0; font-size: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #dee2e6; padding: 12px 10px; text-align: left; vertical-align: middle; font-size: 16px; }
        th { background: #e9ecef; color: var(--mau-c); text-align: center; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="bo-cuc-he-thong" class="bo-cuc-tong">
    <div class="khung-trai">
        <div class="khung-logo">
            <img src="https://i.ibb.co/d0JNW94Z/logo-l-a-ch-n6.png" alt="Logo">
        </div>
        <div class="ten-truong-trai">Trường TH&THCS Hợp Thành</div>

        <div class="danh-muc-trai">
            <a href="index.html" class="the-chuyen" id="menu-danh-gia">
                <span class="b-tuong">📝</span> Đánh giá
            </a>
            <a href="javascript:void(0)" class="the-chuyen" id="menu-ket-qua" style="background-color: rgba(255, 255, 255, 0.15); font-weight: bold;">
                <span class="b-tuong">📈</span> Kết quả
            </a>
            
            <span class="the-chuyen" id="menu-quan-ly-quyen" style="display: none;">
                <span class="b-tuong">👥</span> Quản lý quyền
            </span>
            <span class="the-chuyen" id="menu-tieu-chi-gv" style="display: none;">
                <span class="b-tuong">🏫</span> Tiêu chí GV
            </span>
            <span class="the-chuyen" id="menu-tieu-chi-nv" style="display: none;">
                <span class="b-tuong">💼</span> Tiêu chí NV
            </span>

            <span class="the-chuyen" id="menu-tro-giup">
                <span class="b-tuong">💡</span> Trợ giúp
            </span>
        </div>
    </div>

    <div class="k-ngoai" id="main-ui">
        <div class="k-header-sticky">
            <button class="n-dx" onclick="f_x_logout()">Quay lại Đánh giá</button>
            <div class="k-dau">
                <h2>TRƯỜNG TH&THCS HỢP THÀNH</h2>
                <h1>KẾT QUẢ ĐÁNH GIÁ VIÊN CHỨC</h1>
                <p><i>(Áp dụng từ năm học 2025-2026)</i></p>
            </div>
        </div>

        <div id="h-dang-tai-kq" style="text-align: center; color: var(--mau-c); font-style: italic; margin: 30px; font-size: 16px;">Đang tiến hành trích xuất và sắp xếp dữ liệu...</div>

        <div id="vungKetQua" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th width="10%">STT</th>
                        <th width="50%">Họ và tên</th>
                        <th width="40%">Kết quả xếp loại</th>
                    </tr>
                </thead>
                <tbody id="bang-ket-qua">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        let quyenAdmin = sessionStorage.getItem("HTDG_IS_ADMIN") === "true";
        if (document.getElementById("menu-quan-ly-quyen")) {
            document.getElementById("menu-quan-ly-quyen").style.display = quyenAdmin ? "flex" : "none";
        }
        if (document.getElementById("menu-tieu-chi-gv")) {
            document.getElementById("menu-tieu-chi-gv").style.display = quyenAdmin ? "flex" : "none";
        }
        if (document.getElementById("menu-tieu-chi-nv")) {
            document.getElementById("menu-tieu-chi-nv").style.display = quyenAdmin ? "flex" : "none";
        }
        
        taiDuLieuKetQua();
    });

    function f_x_logout() {
        window.location.href = 'index.html';
    }

    const z_y_a = "https://script.google.com/macros/s/AKfycbynhXlUEopWNlbpbRaD3e50Y0xwevEXIK53VpmOEWMZfhsSnfqxvFctSPeNMRc7709aHw/exec";

    async function taiDuLieuKetQua() {
        try {
            const res = await fetch(`${z_y_a}?z_p_a=l_k_q`);
            const t_k = await res.json();
            
            if (t_k.status === 'success') {
                hienThiBangKetQua(t_k.d_l_k);
                document.getElementById("h-dang-tai-kq").style.display = "none";
                document.getElementById("vungKetQua").style.display = "block";
            } else {
                document.getElementById("h-dang-tai-kq").innerText = "Chưa có dữ liệu trên hệ thống.";
            }
        } catch (err) {
            document.getElementById("h-dang-tai-kq").innerText = "Lỗi kết nối máy chủ. Không thể tải kết quả.";
        }
    }

    function hienThiBangKetQua(d_l) {
        d_l.sort((a, b) => {
            let parseA = phanTichXepLoai(a.x_l_q);
            let parseB = phanTichXepLoai(b.x_l_q);
            if (parseA.muc !== parseB.muc) {
                return parseB.muc - parseA.muc; 
            } else {
                return parseB.diem - parseA.diem; 
            }
        });

        const k_b = document.getElementById("bang-ket-qua");
        let html = "";
        
        d_l.forEach((item, index) => {
            let colorCode = "#333";
            if (item.x_l_q.toLowerCase().includes("xuất sắc")) colorCode = "#dc3545"; 
            else if (item.x_l_q.toLowerCase().includes("tốt")) colorCode = "#0056b3"; 

            html += `<tr>
                <td style="text-align: center; font-weight: bold;">${index + 1}</td>
                <td style="font-weight: bold; color: #1e1e1e;">${item.t_v_c}</td>
                <td style="color: ${colorCode}; font-weight: 500;">${item.x_l_q}</td>
            </tr>`;
        });
        
        if (html === "") html = `<tr><td colspan="3" style="text-align:center;">Chưa có viên chức nào nộp đánh giá</td></tr>`;
        k_b.innerHTML = html;
    }

    function phanTichXepLoai(chuoi) {
        let str = chuoi.toLowerCase();
        let muc = 0; 
        if (str.includes("xuất sắc")) muc = 4;
        else if (str.includes("tốt")) muc = 3;
        else if (str.includes("chưa hoàn thành")) muc = 1;
        else if (str.includes("hoàn thành")) muc = 2; 

        let diem = 0;
        let match = str.match(/([0-9]+[.,]?[0-9]*)\s*điểm/);
        if (match) {
            diem = parseFloat(match[1].replace(',', '.'));
        }
        return { muc: muc, diem: diem };
    }
</script>
</body>
</html>
