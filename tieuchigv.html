<script>
function hXetDuyetG(mKhoiA, mKhoiB, bXanhL, bXanhD) {
    const hKiemLieuG = () => {
        let vSo = 0;
        if (mKhoiA.kE > 60) vSo++; 
        if (hKiemTraChuoiM(mKhoiA.kF, /xã|huyện|cụm|khu|tỉnh|quốc/i)) vSo++; 
        if (hKiemTraChuoiM(mKhoiA.kI, /quốc|tỉnh|nhất.*(cụm|khu|huyện|xã)/i)) vSo++; 
        if (mKhoiA.kK > 20 || mKhoiA.kL > 25) vSo++; 
        return vSo >= (8 * 0.3); 
    };

    const hCoChuoiG = (chuoi) => chuoi && chuoi.trim() !== "";
    let bDatK = hKiemTraChuoiM(mKhoiA.kI, /quốc|tỉnh|nhất.*(xã|cụm|khu|huyện)|nhì.*(cụm|khu|huyện)/i);
    
    let cMucA = (!mKhoiB.tA || mKhoiA.kA === 0) && 
            bXanhL &&
            (mKhoiB.tB && hKiemTraChuoiM(mKhoiA.kB, /tốt/i)) && 
            (mKhoiB.tC && hKiemTraChuoiM(mKhoiA.kC, /giỏi/i)) && 
            (mKhoiB.tD && hKiemTraChuoiM(mKhoiA.kD, /tốt/i)) && 
            (mKhoiB.tE && mKhoiA.kE >= 60) && 
            (mKhoiB.tF && hKiemTraChuoiM(mKhoiA.kF, /trường|xã|huyện|cụm|khu|tỉnh|quốc/i)) &&
            (mKhoiB.tI && mKhoiA.kI.trim() !== "" && bDatK) && 
            (mKhoiB.tJ && mKhoiA.kJ >= 100) && (mKhoiB.tK && mKhoiA.kK >= 20) && (mKhoiB.tL && mKhoiA.kL >= 25) &&
            (mKhoiB.tG && hXetChuoiN(mKhoiA.kG, 'XS')) && 
            hKiemLieuG(); 

    let cMucB = bXanhL &&
             (mKhoiB.tB && hKiemTraChuoiM(mKhoiA.kB, /khá|tốt/i)) && 
             (mKhoiB.tC && hKiemTraChuoiM(mKhoiA.kC, /khá|giỏi/i)) && 
             (mKhoiB.tD && hKiemTraChuoiM(mKhoiA.kD, /khá|tốt/i)) && 
             (mKhoiB.tE && mKhoiA.kE >= 40) && 
             (mKhoiB.tJ && mKhoiA.kJ >= 95) && (mKhoiB.tK && mKhoiA.kK >= 15) && (mKhoiB.tL && mKhoiA.kL >= 25) &&
             (mKhoiB.tG && hXetChuoiN(mKhoiA.kG, 'Tốt'));

    let cMucC = bXanhD && 
            (mKhoiB.tB && hCoChuoiG(mKhoiA.kB) && !hKiemTraChuoiM(mKhoiA.kB, /chưa đạt|kém/i)) && 
            (mKhoiB.tC && hCoChuoiG(mKhoiA.kC) && !hKiemTraChuoiM(mKhoiA.kC, /yếu|kém/i)) &&
            (mKhoiB.tD && hCoChuoiG(mKhoiA.kD) && !hKiemTraChuoiM(mKhoiA.kD, /chưa đạt|kém/i)) &&
            (mKhoiB.tJ && mKhoiA.kJ >= 90) && (mKhoiB.tK && mKhoiA.kK >= 10) && (mKhoiB.tL && mKhoiA.kL >= 20) &&
            (mKhoiB.tG && hXetChuoiN(mKhoiA.kG, 'HT'));

    if (cMucA) return { kTra: "HOÀN THÀNH XUẤT SẮC NHIỆM VỤ", kMau: "#28a745" };
    if (cMucB) return { kTra: "HOÀN THÀNH TỐT NHIỆM VỤ", kMau: "#007bff" };
    if (cMucC) return { kTra: "HOÀN THÀNH NHIỆM VỤ", kMau: "#fd7e14" };
    
    return { kTra: "CHƯA HOÀN THÀNH NHIỆM VỤ", kMau: "#dc3545" };
}
</script>
