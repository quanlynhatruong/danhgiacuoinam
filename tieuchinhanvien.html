<script>
function hXetDuyetN(mKhoiA, mKhoiB, bXanhL, bXanhD) {
    const hKiemLieuN = () => {
        let vSo = 0;
        if (hKiemTraChuoiM(mKhoiA.kH, /huyện|tỉnh|quốc/i)) vSo++;
        if (hKiemTraChuoiM(mKhoiA.kG, /xuất sắc/i)) vSo++;
        return vSo >= (3 * 0.3); 
    };

    const hCoChuoiG = (chuoi) => chuoi && chuoi.trim() !== "";

    let cMucA = bXanhL && (!mKhoiB.tA || mKhoiA.kA === 0) &&
            (mKhoiB.tB && hKiemTraChuoiM(mKhoiA.kB, /tốt/i)) && 
            (mKhoiB.tC && hKiemTraChuoiM(mKhoiA.kC, /giỏi/i)) && 
            (mKhoiB.tD && hKiemTraChuoiM(mKhoiA.kD, /tốt/i)) && 
            (mKhoiB.tH && mKhoiA.kH.trim() !== "" && hKiemTraChuoiM(mKhoiA.kH, /xã|huyện|cụm|tỉnh|quốc/i)) && 
            hXetChuoiN(mKhoiA.kG, 'XS') && hKiemLieuN();

    let cMucB = bXanhL && (!mKhoiB.tA || mKhoiA.kA === 0) && 
             (mKhoiB.tB && hKiemTraChuoiM(mKhoiA.kB, /khá|tốt/i)) && 
             (mKhoiB.tC && hKiemTraChuoiM(mKhoiA.kC, /khá|giỏi/i)) && 
             (mKhoiB.tD && hKiemTraChuoiM(mKhoiA.kD, /khá|tốt/i)) && 
             hXetChuoiN(mKhoiA.kG, 'Tốt');

    let cMucC = bXanhD && (!mKhoiB.tA || mKhoiA.kA <= 2) && 
            (mKhoiB.tB && hCoChuoiG(mKhoiA.kB) && !hKiemTraChuoiM(mKhoiA.kB, /chưa đạt|kém/i)) && 
            (mKhoiB.tC && hCoChuoiG(mKhoiA.kC) && !hKiemTraChuoiM(mKhoiA.kC, /yếu|kém/i)) &&
            (mKhoiB.tD && hCoChuoiG(mKhoiA.kD) && !hKiemTraChuoiM(mKhoiA.kD, /chưa đạt|kém/i)) &&
            hXetChuoiN(mKhoiA.kG, 'HT');

    if (cMucA) return { kTra: "HOÀN THÀNH XUẤT SẮC NHIỆM VỤ", kMau: "#28a745" };
    if (cMucB) return { kTra: "HOÀN THÀNH TỐT NHIỆM VỤ", kMau: "#007bff" };
    if (cMucC) return { kTra: "HOÀN THÀNH NHIỆM VỤ", kMau: "#fd7e14" };
    
    return { kTra: "CHƯA HOÀN THÀNH NHIỆM VỤ", kMau: "#dc3545" };
}
</script>
